<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简记</title>
  <link rel="stylesheet" href="node_modules/codemirror/lib/codemirror.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="node_modules/highlight.js/styles/github-dark.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
      </div>
      <div class="notes-list" id="notesList"></div>
      <div class="sidebar-footer">
        <div class="storage-control">
          <button id="settingsBtn" class="btn-settings" title="管理存储目录" aria-label="管理存储目录">
            <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h5l2 3h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M15 12l3 3-3 3M18 15h-6"/></svg>
          </button>
          <button id="notesDirInfo" class="notes-dir-info" title="管理存储目录">
            <span id="notesDirDisplay" class="notes-dir-path"></span>
          </button>
        </div>
      </div>
    </aside>
    
    <main class="main-content">
      <div class="editors-wrapper" id="editorsWrapper">
        <div class="editor-panel" id="leftPanel">
          <div class="toolbar">
            <button class="toggle-sidebar-btn" id="toggleSidebarBtn" title="隐藏目录" aria-label="切换目录"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16"/></svg></button>
          </div>
          <div class="note-heading-row">
            <input type="text" id="noteTitle" class="note-title-input" placeholder="笔记标题..."
              aria-label="笔记文件名">
          </div>
          <div class="editor-container view-both" id="editorContainer">
            <div class="editor-pane" id="editorPane">
              <textarea id="editor" placeholder="在此输入 Markdown 内容..."></textarea>
              <nav id="documentOutline" class="document-outline" aria-label="文档大纲"></nav>
            </div>
            <div class="divider" id="divider"></div>
            <div class="preview-pane" id="previewPane">
              <div id="preview" class="preview-content"></div>
            </div>
          </div>
        </div>
        
        <div class="panel-divider" id="panelDivider"></div>
        
        <div class="editor-panel" id="rightPanel" style="display: none;">
          <div class="toolbar">
            <div class="toolbar-actions">
              <button class="toggle-preview-btn active" id="togglePreviewBtnRight" title="隐藏预览" aria-label="切换预览"><svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg></button>
              <button id="closeRightBtn" class="btn-icon small" title="关闭" aria-label="关闭"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
            </div>
          </div>
          <div class="note-heading-row note-heading-row-right">
            <input type="text" id="noteTitleRight" class="note-title-input"
              placeholder="笔记标题..." aria-label="右侧笔记文件名">
          </div>
          <div class="editor-container view-both" id="editorContainerRight">
            <div class="editor-pane" id="editorPaneRight">
              <textarea id="editorRight" placeholder="在此输入 Markdown 内容..."></textarea>
              <nav id="documentOutlineRight" class="document-outline" aria-label="文档大纲"></nav>
            </div>
            <div class="divider" id="dividerRight"></div>
            <div class="preview-pane" id="previewPaneRight">
              <div id="previewRight" class="preview-content"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div id="slashCommandMenu" class="slash-command-menu" role="listbox"
      aria-label="Markdown 结构" hidden></div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span id="modalTitle" class="modal-title"></span>
      </div>
      <div class="modal-body">
        <input type="text" id="modalInput" class="modal-input" placeholder="">
      </div>
      <div class="modal-footer">
        <button id="modalCancel" class="btn btn-secondary">取消</button>
        <button id="modalConfirm" class="btn">确定</button>
      </div>
    </div>
  </div>

  <div id="confirmModal" class="modal">
    <div class="modal-content modal-small">
      <div class="modal-header">
        <span id="confirmTitle" class="modal-title"></span>
      </div>
      <div class="modal-body">
        <p id="confirmMessage"></p>
      </div>
      <div class="modal-footer">
        <button id="confirmCancel" class="btn btn-secondary">取消</button>
        <button id="confirmOk" class="btn btn-danger">确定</button>
      </div>
    </div>
  </div>

  <div id="locationsModal" class="modal">
    <div class="modal-content locations-modal-content">
      <div class="modal-header locations-modal-header">
        <div class="locations-window-controls">
          <button id="locationsClose" class="mac-window-control close" title="关闭" aria-label="关闭"><span>×</span></button>
          <span class="mac-window-control minimize" aria-hidden="true"></span>
          <span class="mac-window-control zoom" aria-hidden="true"></span>
        </div>
        <div class="locations-heading">
          <span class="modal-title">存储目录</span>
        </div>
        <span class="locations-header-spacer" aria-hidden="true"></span>
      </div>
      <div class="locations-intro">
        <strong>笔记库</strong>
        <span>选择一个目录作为当前笔记库</span>
      </div>
      <div id="locationsList" class="locations-list"></div>
      <div class="modal-footer locations-footer">
        <span>移除目录不会删除磁盘文件</span>
        <button id="locationsAdd" class="btn">添加目录</button>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="modal" role="dialog" aria-modal="true"
    aria-labelledby="settingsTitle">
    <div class="modal-content settings-modal-content">
      <div class="modal-header settings-modal-header">
        <div class="settings-title-group">
          <span class="settings-kicker">简记偏好</span>
          <span id="settingsTitle" class="modal-title">设置</span>
          <p>管理笔记中使用的图片资源与模板位置。</p>
        </div>
      </div>
      <div class="modal-body settings-modal-body">
        <section class="settings-card">
          <div class="settings-card-heading">
            <span class="settings-card-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/>
                <circle cx="9" cy="10" r="1.5"/><path d="m5.5 17 4.2-4 3 2.7 2.3-2 3.5 3.3"/></svg>
            </span>
            <div class="settings-card-copy">
              <div class="settings-card-title">
                <strong>图片文件目录</strong>
                <span id="imageDirectoryMode" class="settings-status">默认目录</span>
              </div>
              <p>粘贴到笔记中的图片将保存在这里。</p>
            </div>
          </div>
          <div id="imageDirectoryPath" class="image-directory-path"></div>
          <div class="settings-card-actions">
            <button id="imageDirectoryReset" class="btn btn-secondary">恢复默认</button>
            <button id="imageDirectoryChoose" class="btn">选择目录</button>
          </div>
        </section>
        <section class="settings-card">
          <div class="settings-card-heading">
            <span class="settings-card-icon template" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M7 3.5h7l4 4V20H7z"/>
                <path d="M14 3.5V8h4M10 12h5M10 15.5h5"/></svg>
            </span>
            <div class="settings-card-copy">
              <div class="settings-card-title">
                <strong>模板目录</strong>
                <span id="templateDirectoryMode" class="settings-status">未设置</span>
              </div>
              <p>从“插入”菜单快速复用 Markdown 模板。</p>
            </div>
          </div>
          <div id="templateDirectoryPath" class="image-directory-path">未设置</div>
          <div class="settings-card-actions">
            <button id="templateDirectoryClear" class="btn btn-secondary">清除</button>
            <button id="templateDirectoryChoose" class="btn">选择目录</button>
          </div>
        </section>
        <section class="settings-card settings-toggle-card">
          <div class="settings-card-heading">
            <span class="settings-card-icon outline" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M5 6h2M10 6h9M5 12h2M10 12h9M5 18h2M10 18h9"/></svg>
            </span>
            <div class="settings-card-copy">
              <div class="settings-card-title">
                <strong>展示文档大纲</strong>
              </div>
              <p>在内容区右侧展示标题导航，仍遵循原有宽度限制。</p>
            </div>
            <button id="outlineToggle" class="settings-switch" type="button" role="switch"
              aria-checked="true" aria-label="展示文档大纲">
              <span aria-hidden="true"></span>
            </button>
          </div>
        </section>
        <div id="settingsError" class="settings-error" role="status"></div>
      </div>
    </div>
  </div>

  <div id="templateModal" class="modal" role="dialog" aria-modal="true"
    aria-labelledby="templateTitle">
    <div class="modal-content modal-small template-modal-content">
      <div class="modal-header">
        <span id="templateTitle" class="modal-title">选择模板</span>
      </div>
      <div id="templateList" class="template-list"></div>
      <div id="templateError" class="settings-error template-error" role="status"></div>
      <div class="modal-footer">
        <button id="templateCancel" class="btn btn-secondary">取消</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
