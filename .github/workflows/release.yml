name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release version
        run: |
          tagVersion="${GITHUB_REF_NAME#v}"
          packageVersion="$(node -p "require('./package.json').version")"
          if [ "$tagVersion" != "$packageVersion" ]; then
            echo "Tag version $tagVersion does not match package.json version $packageVersion."
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Build macOS DMG
        run: npm run dist:mac -- --publish never

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.dmg \
            --verify-tag \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
